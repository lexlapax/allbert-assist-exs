<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Allbert Workspace Offline</title>
    <link rel="stylesheet" href="/assets/css/app.css" />
  </head>
  <body>
    <main
      id="workspace-offline-shell"
      class="mx-auto max-w-3xl px-4 py-12"
      data-offline-shell="true"
    >
      <section class="rounded border border-base-300 bg-base-100 p-6">
        <p
          id="workspace-offline-banner"
          class="workspace-offline-banner"
          data-state="offline"
          role="status"
        >
          Working offline — the Allbert workspace shell is cached locally.
        </p>
        <h1 class="text-2xl font-bold">Allbert Workspace</h1>
        <p class="mt-3 text-base-content/70">
          Runtime data will rehydrate when the connection returns.
        </p>
      </section>
    </main>
  </body>
</html>
